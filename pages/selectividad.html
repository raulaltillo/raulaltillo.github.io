    <script>
  const selectividadStart = new Date("2026-06-02T07:45:00+02:00").getTime();
  const countdownEls = {
    days: document.getElementById('countdownDays'),
    hours: document.getElementById('countdownHours'),
    minutes: document.getElementById('countdownMinutes'),
    seconds: document.getElementById('countdownSeconds'),
    status: document.getElementById('countdownStatus')
  };

  function setCountdownValue(el, value) {
    el.textContent = String(value).padStart(2, '0');
  }

  function updateCountdown() {
    const now = Date.now();
    const diff = selectividadStart - now;

    if (diff <= 0) {
      setCountdownValue(countdownEls.days, 0);
      setCountdownValue(countdownEls.hours, 0);
      setCountdownValue(countdownEls.minutes, 0);
      setCountdownValue(countdownEls.seconds, 0);
      countdownEls.status.textContent = "Ya ha empezado. No hay escapatoria.";
      return;
    }

    const totalSeconds = Math.floor(diff / 1000);
    const days = Math.floor(totalSeconds / 86400);
    const hours = Math.floor((totalSeconds % 86400) / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    setCountdownValue(countdownEls.days, days);
    setCountdownValue(countdownEls.hours, hours);
    setCountdownValue(countdownEls.minutes, minutes);
    setCountdownValue(countdownEls.seconds, seconds);
    countdownEls.status.textContent = diff < 86400000
      ? "Menos de 24 horas. Mucha suerte"
      : "El reloj sigue bajando.";
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);
